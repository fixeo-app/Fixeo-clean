<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <link rel="icon" type="image/png" href="img/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="img/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil artisan | Fixeo</title>
  <meta name="description" content="Redirection vers le profil artisan public Fixeo.">
  <meta http-equiv="refresh" content="0; url=artisan-profile.html">
  <link rel="canonical" href="artisan-profile.html">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Cairo, Arial, sans-serif;
      background: linear-gradient(135deg,#0D0D1A 0%,#1a1a2e 50%,#16213e 100%);
      color: #fff;
    }
    .card {
      max-width: 560px;
      margin: 24px;
      padding: 28px;
      border-radius: 24px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 18px 50px rgba(0,0,0,.28);
      text-align: center;
    }
    a {
      color: #ff70b8;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
  <script>
    (function () {
      var params = window.location.search || '';
      var hash = window.location.hash || '';
      var target = 'artisan-profile.html' + params + hash;
      window.location.replace(target);
    })();
  </script>
  <link rel="stylesheet" href="css/header-logo-premium.css?v=hlp5">
  <!-- ══ LOGO OVERRIDE — image-only, no emoji, no text ══ -->
  <style id="fixeo-logo-override">
    /* Kill legacy logo-icon and logo-text */
    .navbar-brand .logo-icon, .logo-wrap .logo-icon, .fixeo-gh-brand .logo-icon
      { display:none !important; width:0 !important; height:0 !important; min-width:0 !important; flex:0 !important; }
    .navbar-brand .logo-text, .logo-wrap .logo-text, .fixeo-gh-brand .logo-text
      { display:none !important; width:0 !important; height:0 !important; }
    /* Brand container */
    .navbar-brand, .logo-wrap
      { max-width:220px !important; overflow:visible !important; gap:0 !important; background:transparent !important; }
    .fixeo-gh-brand
      { max-width:180px !important; overflow:visible !important; gap:0 !important; background:transparent !important; }
    /* Logo image — clean tight crop, simple height */
    .navbar-brand img.fixeo-logo-img, .logo-wrap img.fixeo-logo-img,
    img.fixeo-logo-img.fixeo-logo-desktop,
    .navbar-brand img[src*="logo-fixeo-header"], .logo-wrap img[src*="logo-fixeo-header"] {
      display:block !important; height:32px !important; width:auto !important;
      max-width:180px !important; min-width:60px !important;
      object-fit:contain !important; object-position:left center !important;
      background:transparent !important; mix-blend-mode:normal !important;
      filter:none !important; box-shadow:none !important; border:none !important;
      flex:0 0 auto !important; overflow:visible !important;
    }
    /* Mobile bar logo */
    .fixeo-gh-brand img.fixeo-logo-img, .fixeo-gh-brand img[src*="logo-fixeo-header"],
    .fixeo-gh-mobile-bar img.fixeo-logo-img {
      display:block !important; height:28px !important; width:auto !important;
      max-width:160px !important; min-width:50px !important;
      object-fit:contain !important; object-position:left center !important;
      background:transparent !important; mix-blend-mode:normal !important;
      filter:none !important; box-shadow:none !important; border:none !important;
      flex:0 0 auto !important; overflow:visible !important;
    }
    @media (max-width:480px) {
      .navbar-brand img.fixeo-logo-img, .logo-wrap img.fixeo-logo-img { height:26px !important; }
      .fixeo-gh-brand img.fixeo-logo-img { height:24px !important; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Profil artisan</h1>
    <p>Cette page utilise désormais le profil public dynamique de Fixeo.</p>
    <p><a href="artisan-profile.html">Ouvrir le profil public</a></p>
  </main>
</body>
</html>
