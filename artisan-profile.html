<script>

<!-- rf-profile-4: Cold-visit index pre-fetch (~0.3KB inline).
     Fires immediately at body-parse time.
     If fast-path already rendered the hero (window.__fxHeroRendered set): skips entirely.
     Otherwise: starts fetching /data/artisan-index.json in parallel with defer scripts.
     Stores promise as window.__fxIndexPromise.
     When resolved: looks up artisan by id → renders minimal hero using SAME inline CSS
     classes as perf3 fast-path → sets window.__fxHeroRendered sentinel.
     If fetch fails or artisan not found: silent fallback — Supabase chain renders as before.
     Average mobile timeline: 26KB gzipped fetch ~130ms on 3G vs 105KB profile-v2a.js ~525ms.
     Hero appears ~400ms earlier on true cold visits. -->
<script>
(function(){
  try {
    if (window.__fxHeroRendered) return; /* fast-path already fired */
    var id = new URLSearchParams(window.location.search).get('id');
    if (!id) return;
    if (typeof fetch === 'undefined') return;
    window.__fxIndexPromise = fetch('/data/artisan-index.json?v=1', {cache:'force-cache'})
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(idx){

  (function (window) {
    var MARKETPLACE_KEY = 'fixeo_admin_artisans_v21';
    var REGISTRY_KEY = 'fixeo_public_artisans_registry';

    function safeJSONParse(value, fallback) {
      try {
        var parsed = JSON.parse(value);
        return parsed == null ? fallback : parsed;
      } catch (error) {
        return fallback;
      }
    }

    function hasValue(value) {
      return value !== undefined && value !== null && String(value).trim() !== '';
    }

    function pickValue() {
      for (var i = 0; i < arguments.length; i += 1) {
        if (hasValue(arguments[i])) return String(arguments[i]).trim();
      }
      return '';
    }

    function uniquePush(list, value) {
      var nextValue = String(value || '').trim();
      if (!nextValue) return;
      if (list.indexOf(nextValue) === -1) list.push(nextValue);
    }

    function readMarketplaceArtisans() {
      var parsed = safeJSONParse(localStorage.getItem(MARKETPLACE_KEY) || '[]', []);
      return Array.isArray(parsed) ? parsed : [];
    }

    function readRegistry() {
      var parsed = safeJSONParse(localStorage.getItem(REGISTRY_KEY) || '[]', []);
      return Array.isArray(parsed) ? parsed : [];
    }

    function writeRegistry(entries) {
      localStorage.setItem(REGISTRY_KEY, JSON.stringify(Array.isArray(entries) ? entries : []));
    }

    function findMarketplaceArtisanByUrlId(urlId) {
      var requestedId = String(urlId || '').trim();
      if (!requestedId) return null;
      var artisans = readMarketplaceArtisans();
      for (var i = 0; i < artisans.length; i += 1) {
        var artisan = artisans[i];
        if (!artisan || typeof artisan !== 'object') continue;
        var candidateIds = [
          pickValue(artisan.id),
          pickValue(artisan.artisan_id),
          pickValue(artisan.public_id)
        ].filter(Boolean);
        if (candidateIds.indexOf(requestedId) !== -1) return artisan;
      }
      return null;
    }

    function ensureRegistryEntryForMarketplaceArtisan(urlId) {
      var requestedId = String(urlId || '').trim();
      if (!requestedId) return;

      var artisan = findMarketplaceArtisanByUrlId(requestedId);
      if (!artisan) return;

      var registry = readRegistry();
      var sourceIds = [];
      uniquePush(sourceIds, pickValue(artisan.id));
      uniquePush(sourceIds, pickValue(artisan.artisan_id));
      uniquePush(sourceIds, pickValue(artisan.public_id));
      uniquePush(sourceIds, requestedId);

      var publicId = pickValue(artisan.public_id, artisan.artisan_id, artisan.id, requestedId);
      var existingIndex = registry.findIndex(function (entry) {
        var entryPublicId = pickValue(entry && entry.public_id, entry && entry.id);
        var entrySourceIds = Array.isArray(entry && entry.source_ids)
          ? entry.source_ids.map(function (value) { return String(value || '').trim(); }).filter(Boolean)
          : [];
        if (entryPublicId && (entryPublicId === publicId || entryPublicId === requestedId)) return true;
        return sourceIds.some(function (value) { return entrySourceIds.indexOf(value) !== -1; });
      });

      var existing = existingIndex >= 0 && registry[existingIndex] && typeof registry[existingIndex] === 'object'
        ? registry[existingIndex]
        : {};
      var mergedSourceIds = Array.isArray(existing.source_ids)
        ? existing.source_ids.map(function (value) { return String(value || '').trim(); }).filter(Boolean)
        : [];
      sourceIds.forEach(function (value) { uniquePush(mergedSourceIds, value); });

      var entry = {
        public_id: pickValue(existing.public_id, publicId),
        slug: pickValue(existing.slug),
        name: pickValue(existing.name, artisan.name),
        category: pickValue(existing.category, artisan.category, artisan.service, artisan.specialty, artisan.job),
        city: pickValue(existing.city, artisan.city, artisan.ville),
        phone: pickValue(existing.phone, artisan.phone, artisan.telephone),
        email: pickValue(existing.email, artisan.email),
        avatar: pickValue(existing.avatar, artisan.avatar, artisan.photo, artisan.image, artisan.picture),
        availability: pickValue(existing.availability, artisan.availability, artisan.status),
        trust_score: pickValue(existing.trust_score, artisan.trust_score, artisan.trustScore),
        created_at: pickValue(existing.created_at, artisan.created_at, artisan.createdAt),
        source_ids: mergedSourceIds
      };

      if (existingIndex >= 0) registry[existingIndex] = entry;
      else registry.unshift(entry);
      writeRegistry(registry);
    }

    try {
      var params = new URLSearchParams(window.location.search || '');
      ensureRegistryEntryForMarketplaceArtisan(params.get('id'));
    } catch (error) {}
  })(window);
</script>
