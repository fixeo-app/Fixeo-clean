<!DOCTYPE html>
<html lang="fr" dir="ltr" data-theme="dark">
<head>
  <link rel="icon" type="image/png" href="img/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="img/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fixeo — Activez votre profil artisan en quelques secondes." />
  <title>Fixeo — Je suis artisan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/artisan-onboarding.css" />
  <link rel="stylesheet" href="css/fixeo-header-global.css" />
  <link rel="stylesheet" href="css/header-logo-premium.css?v=hlp5">
  <!-- ══ LOGO OVERRIDE — image-only, no emoji, no text ══ -->
  <style id="fixeo-logo-override">
    /* Kill legacy logo-icon and logo-text */
    .navbar-brand .logo-icon, .logo-wrap .logo-icon, .fixeo-gh-brand .logo-icon
      { display:none !important; width:0 !important; height:0 !important; min-width:0 !important; flex:0 !important; }
    .navbar-brand .logo-text, .logo-wrap .logo-text, .fixeo-gh-brand .logo-text
      { display:none !important; width:0 !important; height:0 !important; }
    /* Brand containers — no clipping */
    .navbar-brand, .logo-wrap
      { max-width:220px !important; overflow:visible !important; gap:0 !important; background:transparent !important; }
    .fixeo-gh-brand
      { max-width:180px !important; overflow:visible !important; gap:0 !important; background:transparent !important; }
    /* Logo image — clean, no hacks */
    img.fixeo-logo-img {
      display:block !important;
      height:32px !important;
      width:auto !important;
      object-fit:contain !important;
      object-position:left center !important;
      background:transparent !important;
      mix-blend-mode:normal !important;
      filter:none !important;
      box-shadow:none !important;
      border:none !important;
      flex:0 0 auto !important;
      overflow:visible !important;
    }
    /* Mobile bar logo */
    .fixeo-gh-brand img.fixeo-logo-img,
    .fixeo-gh-mobile-bar img.fixeo-logo-img {
      height:26px !important;
      width:auto !important;
    }
    @media (max-width:480px) {
      img.fixeo-logo-img { height:24px !important; }
      .fixeo-gh-brand img.fixeo-logo-img { height:22px !important; }
    }
  </style>
</head>
<body class="artisan-onboarding-page">
  <main class="artisan-onboarding-shell">
    <a class="artisan-onboarding-back" href="index.html#home">← Retour à Fixeo</a>

    <section class="artisan-onboarding-card" aria-labelledby="artisan-onboarding-title">
      <span class="artisan-onboarding-kicker">Je suis artisan</span>
      <h1 id="artisan-onboarding-title">Activez votre profil artisan</h1>
      <p>Un formulaire simple, mobile-first, pour apparaître immédiatement dans le marketplace Fixeo.</p>

      <form id="artisan-onboarding-form" class="artisan-onboarding-form" novalidate>
        <div class="artisan-onboarding-grid">
          <div class="artisan-onboarding-field" data-field="name">
            <label for="artisan-name">Nom complet</label>
            <input id="artisan-name" name="name" type="text" placeholder="Ex. Nom complet" autocomplete="name" />
            <div class="artisan-onboarding-error" aria-live="polite"></div>
          </div>

          <div class="artisan-onboarding-field" data-field="category">
            <label for="artisan-category">Métier</label>
            <select id="artisan-category" name="category">
              <option value="">Choisir un métier</option>
            </select>
            <div class="artisan-onboarding-error" aria-live="polite"></div>
          </div>

          <div class="artisan-onboarding-field" data-field="city">
            <label for="artisan-city">Ville</label>
            <select id="artisan-city" name="city">
              <option value="">Choisir une ville</option>
            </select>
            <div class="artisan-onboarding-error" aria-live="polite"></div>
          </div>

          <div class="artisan-onboarding-field" data-field="phone">
            <label for="artisan-phone">Téléphone</label>
            <input id="artisan-phone" name="phone" type="tel" inputmode="tel" placeholder="06 12 34 56 78" autocomplete="tel" />
            <div class="artisan-onboarding-error" aria-live="polite"></div>
          </div>

          <div class="artisan-onboarding-field" data-field="description">
            <label for="artisan-description">Description courte <span class="artisan-onboarding-hint">(optionnel)</span></label>
            <textarea id="artisan-description" name="description" maxlength="180" placeholder="Spécialités, zone d’intervention, expérience…"></textarea>
            <div class="artisan-onboarding-error" aria-live="polite"></div>
          </div>
        </div>

        <button id="artisan-submit-btn" class="artisan-onboarding-submit" type="submit">Activer mon profil</button>
        <div class="artisan-onboarding-hint">Badge ajouté automatiquement : nouveau · en ligne · profil en vérification.</div>
      </form>

      <div id="artisan-onboarding-toast" class="artisan-onboarding-toast" hidden></div>

      <div id="artisan-onboarding-success" class="artisan-onboarding-success" hidden>
        <div id="artisan-onboarding-success-summary"></div>
        <div class="artisan-onboarding-actions">
          <a class="is-primary" href="index.html#artisans-section">Voir mon profil dans le marketplace</a>
          <a class="is-secondary" href="results.html">Tester la recherche Fixeo</a>
        </div>
      </div>
    </section>
  </main>

    <script src="js/fixeo-session-mobile.js"></script>
<script src="js/fixeo-header-global.js"></script>
<script src="js/artisan-onboarding-store.js"></script>
  <script src="js/artisan-onboarding.js"></script>
<script src="js/fixeo-artisan-request-notifications.js"></script>
</body>
</html>
